name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile tools
        run: |
          python -m py_compile \
            tools/build_sep_epub.py \
            tools/patch_epub_tradecatlabs_notice.py \
            tools/patch_epub_nav_targets.py \
            tools/check_repo_health.py \
            tools/check_release_assets.py

      - name: Validate repository health
        run: python tools/check_repo_health.py
