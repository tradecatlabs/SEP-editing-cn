name: Build problem
description: Report a local build, dependency, download, or audit problem.
title: "[Build] "
labels:
  - build
body:
  - type: input
    id: os
    attributes:
      label: Environment
      description: 操作系统、Python、Pandoc 版本。
      placeholder: Ubuntu 24.04, Python 3.12, Pandoc 3.x
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: 你执行的完整命令。
      render: bash
      placeholder: python3 tools/build_sep_epub.py --root .source/SEP-CN --jobs 8
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error output
      description: 粘贴关键错误输出，不要省略 traceback。
      render: text
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: 上游 SEP-CN commit、网络环境、是否重试等。
    validations:
      required: false
